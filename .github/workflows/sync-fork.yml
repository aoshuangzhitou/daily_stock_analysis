# 自动同步 Fork 与上游仓库
name: Sync Fork with Upstream

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      sync_branch:
        description: 'Branch to sync (default: main)'
        required: false
        default: 'main'
        type: string

permissions:
  contents: write
  pull-requests: write

env:
  UPSTREAM_REPO: ZhuLinsen/daily_stock_analysis
  UPSTREAM_BRANCH: main
  FORK_BRANCH: main

jobs:
  sync:
    name: Sync Fork
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Fork
        uses: actions/checkout@v4
        with:
          ref: ${{ env.FORK_BRANCH }}
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch Upstream
        id: fetch
        run: |
          echo "Adding upstream: ${{ env.UPSTREAM_REPO }}"
          git remote add upstream https://github.com/${{ env.UPSTREAM_REPO }}.git
          git fetch upstream ${{ env.UPSTREAM_BRANCH }}

          UPSTREAM_COMMIT=$(git rev-parse upstream/${{ env.UPSTREAM_BRANCH }})
          LOCAL_COMMIT=$(git rev-parse HEAD)

          echo "Upstream: $UPSTREAM_COMMIT"
          echo "Local: $LOCAL_COMMIT"

          # 检查是否完全相同
          if [ "$UPSTREAM_COMMIT" = "$LOCAL_COMMIT" ]; then
            echo "Already up to date (identical)"
            echo "has_update=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 检查本地是否已包含上游所有提交（本地领先或同步）
          if git merge-base --is-ancestor upstream/${{ env.UPSTREAM_BRANCH }} HEAD; then
            echo "Local is ahead of or equal to upstream, no sync needed"
            echo "has_update=false" >> $GITHUB_OUTPUT
          else
            echo "Updates found (local is behind upstream)"
            echo "has_update=true" >> $GITHUB_OUTPUT
            echo "Commits to sync:"
            git log --oneline HEAD..upstream/${{ env.UPSTREAM_BRANCH }} | head -20
          fi

      - name: Sync Changes
        id: sync
        if: steps.fetch.outputs.has_update == 'true'
        run: |
          git checkout -b sync-temp upstream/${{ env.UPSTREAM_BRANCH }}
          git checkout ${{ env.FORK_BRANCH }}

          if git merge sync-temp --no-edit -m "Sync from upstream ${{ env.UPSTREAM_REPO }}"; then
            echo "sync_status=success" >> $GITHUB_OUTPUT
          else
            git merge --abort || true
            echo "sync_status=conflict" >> $GITHUB_OUTPUT
            exit 1
          fi

          git branch -D sync-temp || true

      - name: Push to Fork
        if: steps.sync.outputs.sync_status == 'success'
        run: |
          git push origin ${{ env.FORK_BRANCH }}

      - name: Handle Conflict
        if: failure() && steps.sync.outputs.sync_status == 'conflict'
        run: |
          echo "Merge conflict detected"
          exit 1

  create-pr:
    name: Create Sync PR
    runs-on: ubuntu-latest
    needs: sync
    if: failure() || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Git and Create Branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/${{ env.UPSTREAM_REPO }}.git
          git fetch upstream ${{ env.UPSTREAM_BRANCH }}

      - name: Create Sync Branch
        run: |
          # 强制创建并切换到新分支（基于 upstream）
          git checkout -B sync-upstream upstream/${{ env.UPSTREAM_BRANCH }}
          # 推送到 fork
          git push origin sync-upstream --force

      - name: Wait for Branch Sync
        run: |
          # 等待 GitHub API 同步分支信息
          for i in {1..5}; do
            if git ls-remote origin refs/heads/sync-upstream | grep -q sync-upstream; then
              echo "Branch sync-upstream is available on origin"
              exit 0
            fi
            echo "Waiting for branch sync... ($i/5)"
            sleep 2
          done
          echo "Warning: Branch may not be fully synced yet"

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          EXISTING_PR=$(gh pr list --repo ${{ github.repository }} --head sync-upstream --base ${{ env.FORK_BRANCH }} --json number -q '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING_PR" ]; then
            echo "PR #$EXISTING_PR already exists"
            exit 0
          fi

          # 检查分支间是否有差异
          if git merge-base --is-ancestor ${{ env.FORK_BRANCH }} sync-upstream && \
             git merge-base --is-ancestor sync-upstream ${{ env.FORK_BRANCH }}; then
            echo "No commits between ${{ env.FORK_BRANCH }} and sync-upstream, no PR needed"
            exit 0
          fi

          gh pr create --repo ${{ github.repository }} \
            --title "Sync from upstream ${{ env.UPSTREAM_REPO }}" \
            --body "Auto-sync from upstream" \
            --base ${{ env.FORK_BRANCH }} \
            --head sync-upstream || {
              ERROR_MSG=$?
              # 如果错误是 "No commits between"，则视为正常退出
              if gh pr create 2>&1 | grep -q "No commits between"; then
                echo "No commits between branches, no PR needed"
                exit 0
              fi
              exit $ERROR_MSG
            }
